<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이디노 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --teal: #3a8a7a; --teal2: #2d6e61; --teal-lt: #e8f5f2; --sand: #f7f4ef; --dark: #2c2c2c; --mid: #666; --orange: #c85a2a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--sand); color: var(--dark); min-height: 100vh; padding: 0 0 60px; }
  .hero { background: var(--teal2); padding: 32px 24px 28px; text-align: center; }
  .hero-title { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 1px; }
  .hero-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 6px; letter-spacing: 2px; }
  .card { background: #fff; border-radius: 16px; padding: 22px 22px; margin: 20px 16px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--teal); letter-spacing: 2px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--teal-lt); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--mid); margin-bottom: 5px; }
  .field input { width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; font-family: 'Noto Sans KR', sans-serif; color: var(--dark); background: #fafafa; transition: border-color 0.2s; }
  .field input:focus { outline: none; border-color: var(--teal); background: #fff; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .token-wrap { position: relative; }
  .token-wrap input { padding-right: 44px; font-family: monospace; font-size: 13px; }
  .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--mid); font-size: 18px; }
  .preview { background: var(--teal-lt); border-radius: 12px; padding: 14px 16px; margin-top: 4px; }
  .prev-row { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(58,138,122,0.15); font-size: 14px; }
  .prev-row:last-child { border-bottom: none; }
  .prev-lbl { color: var(--teal2); font-size: 12px; min-width: 54px; font-weight: 500; }
  .prev-val { color: var(--dark); font-weight: 500; }
  .btn-push { width: calc(100% - 32px); margin: 20px 16px 0; background: var(--teal2); color: #fff; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; letter-spacing: 1px; transition: background 0.2s; }
  .btn-push:hover { background: var(--teal); }
  .btn-push:disabled { background: #aaa; cursor: not-allowed; }
  .status { margin: 12px 16px 0; border-radius: 12px; padding: 12px 16px; font-size: 14px; display: none; line-height: 1.6; }
  .status.ok { background: #e8f5f2; color: #0f6e56; display: block; }
  .status.err { background: #fff0ee; color: #a33; display: block; }
  .status.loading { background: #f5f5f5; color: #666; display: block; }
  .link-btn { display: block; text-align: center; margin: 12px 16px 0; padding: 12px; background: #fff; border: 1.5px solid var(--teal); border-radius: 12px; color: var(--teal); font-size: 14px; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-title">♤ 아이디노 제주 ♤</div>
  <div class="hero-sub">관 리 자 페 이 지</div>
</div>

<div class="card">
  <div class="card-title">GitHub 설정</div>
  <div class="field">
    <label>Personal Access Token (repo 권한)</label>
    <div class="token-wrap">
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" oninput="saveToken()">
      <button class="eye-btn" onclick="toggleToken()">👁</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:6px;">
      <span id="token-status" style="display:none;font-size:12px;color:#3a8a7a;flex:1;padding-top:2px;"></span>
      <button onclick="clearToken()" style="font-size:11px;color:#999;background:none;border:none;cursor:pointer;text-decoration:underline;">토큰 삭제</button>
    </div>
  </div>
  <div class="field">
    <label>업데이트할 페이지</label>
    <select id="target-file" onchange="updateGuestLink()" style="width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:#2c2c2c;background:#fafafa;">
      <option value="index.html">메인 게스트 페이지 (index.html)</option>
      <option value="guest2.html">게스트 2팀 (guest2.html)</option>
      <option value="guest3.html">게스트 3팀 (guest3.html)</option>
    </select>
  </div>
</div>

<div class="card">
  <div class="card-title">예약 정보</div>
  <div class="field">
    <label>예약자 이름</label>
    <input type="text" id="name" placeholder="예: 김민규" oninput="updatePreview()">
  </div>
  <div class="row2">
    <div class="field">
      <label>체크인</label>
      <input type="date" id="checkin" oninput="updatePreview()">
    </div>
    <div class="field">
      <label>체크아웃</label>
      <input type="date" id="checkout" oninput="updatePreview()">
    </div>
  </div>
  <div class="field">
    <label>호실</label>
    <input type="text" id="room" placeholder="예: 코피아 201호" oninput="updatePreview()">
  </div>
  <div class="preview">
    <div class="prev-row"><span class="prev-lbl">예약자</span><span class="prev-val" id="pv-name">—</span></div>
    <div class="prev-row"><span class="prev-lbl">일자</span><span class="prev-val" id="pv-date">—</span></div>
    <div class="prev-row"><span class="prev-lbl">호실</span><span class="prev-val" id="pv-room">—</span></div>
  </div>
</div>

<button class="btn-push" id="push-btn" onclick="pushToGitHub()">📤 GitHub에 바로 올리기</button>
<div class="status" id="status"></div>
<a class="link-btn" id="guest-link" href="https://partyok-create.github.io/idino-guide/" target="_blank">🔗 게스트 페이지 열기</a>

<script>
const OWNER = 'partyok-create';
const REPO  = 'idino-guide';
const PATH  = document.getElementById('target-file')?.value || 'index.html';

function toggleToken() {
  const inp = document.getElementById('token');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function saveToken() {
  const val = document.getElementById('token').value.trim();
  if (val) { localStorage.setItem('idino_token', val); showTokenStatus('✅ 토큰 저장됨'); }
}

function loadToken() {
  const saved = localStorage.getItem('idino_token');
  if (saved) {
    document.getElementById('token').value = saved;
    showTokenStatus('🔐 저장된 토큰 불러옴');
  }
}

function clearToken() {
  localStorage.removeItem('idino_token');
  document.getElementById('token').value = '';
  showTokenStatus('🗑 토큰 삭제됨');
}

function showTokenStatus(msg) {
  const el = document.getElementById('token-status');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
}

window.addEventListener('load', () => { loadToken(); updateGuestLink(); });

function updateGuestLink() {
  const file = document.getElementById('target-file').value;
  const base = 'https://partyok-create.github.io/idino-guide/';
  const url = file === 'index.html' ? base : base + file;
  document.getElementById('guest-link').href = url;
  document.getElementById('guest-link').textContent = '🔗 게스트 페이지 열기 (' + file + ')';
}

function calcNights(a, b) {
  if (!a || !b) return 0;
  return Math.max(0, (new Date(b) - new Date(a)) / 86400000);
}

function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return y + '. ' + m + '. ' + day;
}

function updatePreview() {
  const name = document.getElementById('name').value;
  const ci   = document.getElementById('checkin').value;
  const co   = document.getElementById('checkout').value;
  const room = document.getElementById('room').value;
  const n    = calcNights(ci, co);
  document.getElementById('pv-name').textContent = name ? name + ' 님' : '—';
  document.getElementById('pv-room').textContent = room || '—';
  document.getElementById('pv-date').textContent =
    ci && co && n > 0 ? fmtDate(ci) + ' ~ ' + fmtDate(co) + ' (' + n + '박)' :
    ci ? fmtDate(ci) : '—';
}

function buildHTML() {
  const name = document.getElementById('name').value || '—';

  const co   = document.getElementById('checkout').value;
  const room = document.getElementById('room').value || '—';
  const n    = calcNights(ci, co);
  const dateStr = ci && co && n > 0
    ? fmtDate(ci) + ' ~ ' + fmtDate(co) + ' (' + n + '박)'
    : ci ? fmtDate(ci) : '—';

  return `<!DOCTYPE html>

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status ' + type;
}

async function pushToGitHub() {
  const token = document.getElementById('token').value.trim();
  const name  = document.getElementById('name').value.trim();
  if (!token) { setStatus('토큰을 입력해주세요.', 'err'); return; }
  if (!name)  { setStatus('예약자 이름을 입력해주세요.', 'err'); return; }

  const btn = document.getElementById('push-btn');
  btn.disabled = true;
  setStatus('⏳ GitHub에 업로드 중...', 'loading');

  try {
    const targetPath = document.getElementById('target-file').value;
    const apiBase = 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + targetPath;
    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

    const getRes = await fetch(apiBase, { headers });
    if (!getRes.ok) throw new Error('파일 조회 실패 (토큰 권한을 확인해주세요)');
    const { sha } = await getRes.json();

    const content = btoa(unescape(encodeURIComponent(buildHTML())));
    const putRes = await fetch(apiBase, {
      method: 'PUT', headers,
      body: JSON.stringify({ message: '예약 안내 업데이트: ' + name + ' (' + targetPath + ')', content, sha })
    });

    if (!putRes.ok) throw new Error('업로드 실패: ' + putRes.status);

    setStatus('✅ 업로드 완료!<br>1~2분 후 아래 버튼으로 확인하세요.', 'ok');
  } catch (e) {
    setStatus('❌ 오류: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}
